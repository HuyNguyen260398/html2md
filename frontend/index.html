<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <title>html-2-md — URL to Markdown</title>

    <!-- Apply saved theme before first paint to prevent flash -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('theme')
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          if (saved === 'dark' || (!saved && prefersDark)) {
            document.documentElement.classList.add('dark')
          }
        } catch (e) {}
      })()
    </script>

    <style>
      /* ── Theme tokens (mirrors themes.css — ensures loader is themed before bundle loads) ── */
      :root {
        --color-canvas-default: #ffffff;
        --color-canvas-subtle:  #f6f8fa;
        --color-border-default: #d0d7de;
        --color-fg-default:     #24292f;
        --color-fg-muted:       #57606a;
        --color-accent-fg:      #0969da;
      }
      .dark {
        --color-canvas-default: #0d1117;
        --color-canvas-subtle:  #161b22;
        --color-border-default: #30363d;
        --color-fg-default:     #e6edf3;
        --color-fg-muted:       #8b949e;
        --color-accent-fg:      #58a6ff;
      }

      /* ── Page loader overlay ── */
      #page-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: var(--color-canvas-default);
        opacity: 1;
        transition: opacity 0.3s ease;
      }
      #page-loader.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      /* ── Loader card ── */
      .loader-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        user-select: none;
      }

      /* Tag icon */
      .loader-tag {
        font-family: 'Courier New', Courier, monospace;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.08em;
        color: var(--color-accent-fg);
        opacity: 0.75;
      }

      /* Brand name */
      .loader-title {
        font-family: 'Courier New', Courier, monospace;
        font-size: 26px;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: var(--color-fg-default);
        display: flex;
        align-items: center;
        gap: 0;
      }
      .loader-title-cursor {
        display: inline-block;
        width: 2px;
        height: 1.1em;
        background-color: var(--color-accent-fg);
        margin-left: 3px;
        border-radius: 1px;
        vertical-align: text-bottom;
        animation: loader-blink 1s step-end infinite;
      }

      /* Indeterminate progress bar */
      .loader-bar-track {
        width: 140px;
        height: 2px;
        background-color: var(--color-border-default);
        border-radius: 1px;
        overflow: hidden;
        position: relative;
      }
      .loader-bar {
        position: absolute;
        top: 0;
        left: -45%;
        height: 100%;
        width: 45%;
        background-color: var(--color-accent-fg);
        border-radius: 1px;
        animation: loader-slide 1.1s ease-in-out infinite;
      }

      @keyframes loader-slide {
        0%   { left: -45%; }
        100% { left: 105%; }
      }
      @keyframes loader-blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }

      /* ── Reduced-motion: keep loader visible but skip animation ── */
      @media (prefers-reduced-motion: reduce) {
        .loader-bar        { animation: none; left: 0; width: 100%; }
        .loader-title-cursor { animation: none; }
        #page-loader       { transition: none; }
      }
    </style>
  </head>
  <body>
    <!-- Page loader — removed by App.vue onMounted -->
    <div id="page-loader" role="status" aria-label="Loading html-2-md">
      <div class="loader-inner" aria-hidden="true">
        <span class="loader-tag">&lt;/&gt;</span>
        <span class="loader-title">
          html-2-md<span class="loader-title-cursor"></span>
        </span>
        <div class="loader-bar-track">
          <div class="loader-bar"></div>
        </div>
      </div>
    </div>

    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
